{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">

Prediction History

</h2>

<table class="table table-bordered">

<thead>

<tr>

<th>#</th>

<th>News</th>

<th>Prediction</th>

</tr>

</thead>

<tbody>

{% for row in history %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ row[0][:120] }}...</td>

<td>

{% if row[1]=="Real News" %}

<span class="badge bg-success">

Real

</span>

{% else %}

<span class="badge bg-danger">

Fake

</span>

{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
